<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula 06 - Galeria Responsiva</title>
    <link rel="stylesheet" href="/Aula 6/CSS/Style.Css">
</head>
<body>
    <div class="gallery-container"> <!-- Div q centraliza toda a galeria -->
        <H1>Galeria de Viagens</H1>

        <Div class="grid"> <!-- Grid da galeria/   Container flex que usa o flex wrap pra criar uma grid responsivel usando flexbox -->
<!-- ------------------------------------------------------------------------------------------------------------------------------------------ -->
            <div class="item"> <!-- item 1 -->
                <img src="/Aula 6/img/Paris.png" alt="foto da torri eifel"> <!-- imagem da viagem -->
                <Div class="overlay">Paris</Div> <!-- camada de texto sobre a imagem -->
            </div>
<!-- ------------------------------------------------------------------------------------------------------------------------------------------ -->
            <div class="item"> <!-- item 2 -->
                <img src="/Aula 6/img/Liberdade.png" alt="Estátua da Liberdade"> <!-- imagem da viagem -->
                <Div class="overlay">Nova Iorque</Div> <!-- camada de texto sobre a imagem -->
            </div>
<!-- ------------------------------------------------------------------------------------------------------------------------------------------ -->
            <div class="item"> <!-- item 3 -->
                <img src="/Aula 6/img/Tokyo.png" alt="Foto duma torre japonesa"> <!-- imagem da viagem -->
                <Div class="overlay">Toquio</Div> <!-- camada de texto sobre a imagem -->
            </div>
<!-- ------------------------------------------------------------------------------------------------------------------------------------------ -->
            <div class="item"> <!-- item 4 -->
                <img src="/Aula 6/img/londres.png" alt="foto de londres"> <!-- imagem da viagem -->
                <Div class="overlay">Londres</Div> <!-- camada de texto sobre a imagem -->
            </div>
<!-- ------------------------------------------------------------------------------------------------------------------------------------------ -->
            <div class="item"> <!-- item 4 -->
                <img src="/Aula 6/img/alemanha.png" alt="foto da alemanha"> <!-- imagem da viagem -->
                <Div class="overlay">alemanha</Div> <!-- camada de texto sobre a imagem -->
            </div>
<!-- ------------------------------------------------------------------------------------------------------------------------------------------ -->
            <div class="item"> <!-- item 4 -->
                <img src="/Aula 6/img/saopaulo.png" alt="foto de são paulo"> <!-- imagem da viagem -->
                <Div class="overlay">são paulo</Div> <!-- camada de texto sobre a imagem -->
            </div>
<!-- ------------------------------------------------------------------------------------------------------------------------------------------ -->
        </Div> <!-- Fim div grid -->
    </div> <!-- fim div gallery container -->
</body>
</html>
